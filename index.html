<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendeteksi Energi Meta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .btn-active:active { transform: scale(0.92); }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanner-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, rgba(239, 68, 68, 0.8), transparent);
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            animation: scan 3s linear infinite;
            z-index: 20;
        }
        .crt-noise {
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            opacity: 0.05;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 min-h-screen flex flex-col items-center justify-center p-0 md:p-8 font-mono">

    <div class="w-full max-w-md bg-gray-900 md:rounded-3xl shadow-2xl overflow-hidden border border-gray-800 flex flex-col h-screen md:h-auto relative">
        
        <!-- Header HUD -->
        <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-start z-30 pointer-events-none">
            <div>
                <h1 class="text-red-500 font-bold tracking-widest text-sm flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                    META SENSOR
                </h1>
                <p id="energyLevelText" class="text-xs text-red-400/80 mt-1">ENERGY DETECT: 0%</p>

                <!-- Sub Menu Focus Tracking -->
                <div id="focusHud" class="mt-3 border-l-2 border-cyan-500 pl-2 hidden">
                    <p class="text-[10px] text-cyan-400 tracking-widest font-bold">FOCUS TRACKING</p>
                    <div class="w-24 h-1 bg-gray-800 mt-1 relative overflow-hidden rounded-full">
                        <div id="focusBar" class="absolute top-0 left-0 h-full bg-cyan-500 w-0 transition-all duration-75"></div>
                    </div>
                    <p id="focusStatusText" class="text-[10px] text-cyan-600 mt-1 tracking-widest">STABILIZING...</p>
                </div>

                <!-- Dark Environment Alert -->
                <div id="darkAlert" class="mt-2 text-[10px] text-purple-400 tracking-widest font-bold animate-pulse hidden bg-purple-900/40 p-1 rounded border border-purple-500/50">
                    ⚠️ ANOMALI TERDETEKSI: ENTITAS <span id="entityIdText">#00</span>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 tracking-widest" id="timeDisplay">00:00:00</p>
                <p class="text-[10px] text-gray-500 tracking-widest mt-1">REC [::]</p>
            </div>
        </div>

        <!-- Area Kamera -->
        <div class="relative bg-black w-full flex-grow md:aspect-[3/4] flex justify-center items-center overflow-hidden">
            <video id="video" class="hidden" autoplay playsinline></video>
            <canvas id="outputCanvas" class="w-full h-full object-cover z-0"></canvas>

            <div id="hudOverlay" class="absolute inset-0 z-10 pointer-events-none hidden border-[1px] border-red-900/30">
                <div class="absolute top-8 left-8 w-8 h-8 border-t-2 border-l-2 border-red-500/50"></div>
                <div class="absolute top-8 right-8 w-8 h-8 border-t-2 border-r-2 border-red-500/50"></div>
                <div class="absolute bottom-8 left-8 w-8 h-8 border-b-2 border-l-2 border-red-500/50"></div>
                <div class="absolute bottom-8 right-8 w-8 h-8 border-b-2 border-r-2 border-red-500/50"></div>
                
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 flex items-center justify-center opacity-40">
                    <div class="w-full h-[1px] bg-red-500"></div>
                    <div class="absolute h-full w-[1px] bg-red-500"></div>
                    <div class="w-4 h-4 rounded-full border border-red-500 absolute"></div>
                </div>

                <div class="scanner-line"></div>
                <div class="absolute inset-0 crt-noise z-20"></div>
            </div>

            <div id="cameraStatus" class="absolute text-red-500/50 text-center z-0 flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <p class="tracking-widest text-xs font-bold">SYSTEM OFFLINE</p>
                <button id="initBtn" class="mt-4 px-4 py-2 border border-red-500/50 text-red-500 hover:bg-red-500/10 text-xs tracking-widest rounded transition">INISIALISASI SENSOR</button>
            </div>
        </div>

        <!-- Panel Kontrol -->
        <div class="p-6 bg-gray-900 border-t border-gray-800 z-20 flex justify-between items-center relative">
            <div class="absolute -top-12 left-1/2 -translate-x-1/2 w-3/4 max-w-[200px] h-3 rounded-full flex overflow-hidden border border-gray-800 hidden" id="colorScale">
                <div class="h-full flex-1 bg-black"></div>
                <div class="h-full flex-1 bg-blue-700"></div>
                <div class="h-full flex-1 bg-purple-600"></div>
                <div class="h-full flex-1 bg-red-600"></div>
                <div class="h-full flex-1 bg-yellow-400"></div>
                <div class="h-full flex-1 bg-white"></div>
            </div>

            <button id="switchCameraBtn" class="btn-active p-3 text-gray-500 hover:text-red-400 transition disabled:opacity-30" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>

            <button id="captureBtn" class="btn-active relative flex items-center justify-center w-16 h-16 rounded-full border-2 border-red-900 disabled:opacity-30 transition duration-300 group" disabled>
                <div class="w-12 h-12 bg-red-950 group-hover:bg-red-900 rounded-full transition flex items-center justify-center text-red-500 text-xs font-bold">
                    SCAN
                </div>
            </button>

            <button id="toggleFilterBtn" class="btn-active p-3 text-red-500 hover:text-white transition disabled:opacity-30 relative" disabled>
                 <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Galeri -->
    <div id="galleryContainer" class="fixed inset-0 bg-black/90 z-50 flex-col items-center justify-center hidden p-4">
        <h2 class="text-red-500 font-bold tracking-widest mb-4">DATA TERSIMPAN</h2>
        <img id="previewImg" class="max-w-full max-h-[70vh] border border-red-500/50 shadow-[0_0_20px_rgba(239,68,68,0.3)] mb-6">
        <div class="flex gap-4">
            <button id="closeGalleryBtn" class="px-6 py-2 border border-gray-600 text-gray-300 hover:bg-gray-800 text-xs tracking-widest">TUTUP</button>
            <a id="downloadLink" class="px-6 py-2 bg-red-900/50 border border-red-500 text-red-100 hover:bg-red-800 text-xs tracking-widest text-center flex items-center">EKSPOR DATA</a>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        const initBtn = document.getElementById('initBtn');
        const switchCameraBtn = document.getElementById('switchCameraBtn');
        const captureBtn = document.getElementById('captureBtn');
        const toggleFilterBtn = document.getElementById('toggleFilterBtn');
        
        const cameraStatus = document.getElementById('cameraStatus');
        const hudOverlay = document.getElementById('hudOverlay');
        const colorScale = document.getElementById('colorScale');
        const energyLevelText = document.getElementById('energyLevelText');
        
        const focusHud = document.getElementById('focusHud');
        const focusBar = document.getElementById('focusBar');
        const focusStatusText = document.getElementById('focusStatusText');
        const darkAlert = document.getElementById('darkAlert');
        const entityIdText = document.getElementById('entityIdText');

        const galleryContainer = document.getElementById('galleryContainer');
        const previewImg = document.getElementById('previewImg');
        const closeGalleryBtn = document.getElementById('closeGalleryBtn');
        const downloadLink = document.getElementById('downloadLink');

        let stream = null;
        let isCameraOn = false;
        let currentFacingMode = 'environment';
        let animationId;
        let applyThermalFilter = true;

        // Variabel Fokus
        let previousLumaData = null;
        let lastMoveTime = Date.now();

        // Variabel Entitas Energi
        let currentEntity = null;
        let entitySpawnTime = 0;
        let isDarkEnvironment = false;

        setInterval(() => {
            const now = new Date();
            document.getElementById('timeDisplay').innerText = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        async function startCamera() {
            cameraStatus.innerHTML = '<p class="text-xs text-yellow-500 animate-pulse tracking-widest">MENGHUBUNGKAN...</p>';
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    previousLumaData = new Uint8Array(canvas.width * canvas.height);
                    
                    cameraStatus.classList.add('hidden');
                    hudOverlay.classList.remove('hidden');
                    colorScale.classList.remove('hidden');
                    focusHud.classList.remove('hidden');
                    
                    isCameraOn = true;
                    switchCameraBtn.disabled = false;
                    captureBtn.disabled = false;
                    toggleFilterBtn.disabled = false;
                    lastMoveTime = Date.now(); 
                    renderFrame();
                };
            } catch (err) {
                cameraStatus.innerHTML = '<p class="text-xs text-red-500 tracking-widest">AKSES DITOLAK / ERROR</p>';
            }
        }

        async function switchCamera() {
            if (!isCameraOn) return;
            cancelAnimationFrame(animationId);
            stream.getTracks().forEach(track => track.stop());
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            await startCamera();
        }

        function drawFocusEnergy() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const time = Date.now() / 1000;
            
            ctx.globalCompositeOperation = 'screen';
            for (let i = 0; i < 3; i++) {
                const radius = 80 + Math.sin(time * 3 + i) * 30 + (i * 40);
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 255, 255, ${0.4 - (i * 0.1)})`;
                ctx.lineWidth = 3 + (Math.sin(time * 5) + 1);
                ctx.stroke();
            }
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(time * 0.5);
            ctx.strokeStyle = `rgba(0, 200, 255, 0.6)`;
            ctx.lineWidth = 1.5;
            ctx.strokeRect(-60, -60, 120, 120);
            ctx.rotate(-time); 
            ctx.strokeRect(-40, -40, 80, 80);
            ctx.restore();
            ctx.strokeStyle = `rgba(0, 255, 255, ${(Math.sin(time * 4) + 1) * 0.15})`;
            ctx.lineWidth = 20;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-over';
        }

        // --- SISTEM PEMBANGKIT ENTITAS ENERGI (50 JENIS) ---
        function generateNewEntity() {
            // Pilih 1 dari 50 jenis ID yang berbeda
            const typeId = Math.floor(Math.random() * 50) + 1;
            entityIdText.innerText = `#${typeId < 10 ? '0'+typeId : typeId}`;

            // Algoritma pembentuk parameter unik untuk tiap entitas berdasarkan typeId
            const colorPalettes = [
                {r:0, g:255, b:150},   // Ektoplasma Hijau
                {r:200, g:0, b:255},   // Astral Ungu
                {r:0, g:100, b:255},   // Arwah Biru
                {r:255, g:50, b:50},   // Energi Marah Merah
                {r:255, g:255, b:255}  // Orbs Murni Putih
            ];
            const color = colorPalettes[typeId % 5];
            
            currentEntity = {
                id: typeId,
                x: canvas.width * 0.2 + (Math.random() * (canvas.width * 0.6)), // Posisi awal acak
                y: canvas.height * 0.2 + (Math.random() * (canvas.height * 0.6)),
                vx: (Math.random() - 0.5) * 1.5,
                vy: (Math.random() - 0.5) * 1.5,
                color: color,
                baseSize: 30 + Math.random() * 80, // Ukuran bervariasi
                numPetals: 2 + (typeId % 12),      // Menentukan kompleksitas bentuk (Spirograph)
                wobbleSpeed: 0.5 + Math.random(),
                lifeCycle: 0,                      // 0 ke 1 (Fade in/out)
                maxLife: 200 + Math.random() * 300 // Durasi entitas bertahan (dalam frame)
            };
        }

        function drawEntity() {
            if (!currentEntity) return;

            const e = currentEntity;
            e.x += e.vx;
            e.y += e.vy;
            e.lifeCycle++;

            // Hitung Opacity (Fade in perlahan, stay, lalu fade out)
            let opacity = 0;
            if (e.lifeCycle < 50) {
                opacity = e.lifeCycle / 50; // Fade in
            } else if (e.lifeCycle > e.maxLife - 50) {
                opacity = (e.maxLife - e.lifeCycle) / 50; // Fade out
            } else {
                opacity = 1; // Stay
            }

            // Jika umur habis, hapus entitas (akan digenerate baru nanti)
            if (e.lifeCycle >= e.maxLife) {
                currentEntity = null;
                return;
            }

            ctx.globalCompositeOperation = 'screen';
            const time = Date.now() / 1000;
            
            ctx.save();
            ctx.translate(e.x, e.y);
            
            // Pergerakan rotasi lambat
            ctx.rotate(time * (e.id % 2 === 0 ? 0.5 : -0.5));

            // Gambar bentuk unik berdasarkan ID (dari 1 sampai 50)
            ctx.beginPath();
            
            // Kompleksitas bentuk ditentukan oleh numPetals (Algoritma Rose Curve)
            for(let i = 0; i < Math.PI * 2; i += 0.05) {
                // Manipulasi jari-jari untuk membentuk pola aneh yang berdenyut
                const r = e.baseSize + 
                          Math.sin(i * e.numPetals + time * e.wobbleSpeed) * (e.baseSize * 0.5) +
                          Math.cos(i * (e.numPetals / 2) - time) * 10;
                
                const px = Math.cos(i) * r;
                const py = Math.sin(i) * r;
                
                if(i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();

            // Beri warna glow
            ctx.shadowBlur = 30;
            ctx.shadowColor = `rgba(${e.color.r}, ${e.color.g}, ${e.color.b}, ${opacity})`;
            ctx.lineWidth = 2 + (e.id % 4);
            ctx.strokeStyle = `rgba(${e.color.r}, ${e.color.g}, ${e.color.b}, ${opacity * 0.8})`;
            ctx.stroke();
            
            // Inti Entitas
            ctx.fillStyle = `rgba(255, 255, 255, ${opacity * 0.5})`;
            ctx.fill();

            // Tambahkan "mata/inti" kecil agar lebih seram untuk beberapa tipe
            if (e.id % 3 === 0) {
                ctx.beginPath();
                ctx.arc(0, 0, e.baseSize * 0.1, 0, Math.PI*2);
                ctx.fillStyle = `rgba(0, 0, 0, ${opacity * 0.8})`;
                ctx.fill();
            }

            ctx.restore();
            ctx.globalCompositeOperation = 'source-over';
        }

        // --- RENDER UTAMA ---
        function renderFrame() {
            if (!isCameraOn) return;

            if(currentFacingMode === 'user') {
                ctx.save();
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();
            } else {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            }

            if (applyThermalFilter) {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                let totalBrightness = 0;
                let totalMotion = 0;
                let pixelIndex = 0;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i]; const g = data[i + 1]; const b = data[i + 2];
                    const luma = 0.299 * r + 0.587 * g + 0.114 * b;
                    totalBrightness += luma;

                    if (previousLumaData) totalMotion += Math.abs(luma - previousLumaData[pixelIndex]);
                    if (previousLumaData) previousLumaData[pixelIndex] = luma;
                    pixelIndex++;

                    // Mapping Warna Meta
                    if (luma < 40) { data[i]=0; data[i+1]=0; data[i+2]=luma*0.5; } 
                    else if (luma < 90) { data[i]=(luma-40)*2; data[i+1]=0; data[i+2]=150; } 
                    else if (luma < 150) { data[i]=200+(luma-90); data[i+1]=0; data[i+2]=150-(luma-90)*2; } 
                    else if (luma < 210) { data[i]=255; data[i+1]=(luma-150)*4; data[i+2]=0; } 
                    else { data[i]=255; data[i+1]=255; data[i+2]=150+(luma-210)*2; }
                }

                ctx.putImageData(imageData, 0, 0);

                const totalPixels = canvas.width * canvas.height;
                const avgBrightness = totalBrightness / totalPixels;
                const avgMotion = totalPixels > 0 ? (totalMotion / totalPixels) : 0;
                const energyPercentage = Math.min(100, Math.round((avgBrightness / 255) * 100 * 1.5));
                
                energyLevelText.innerText = `ENERGY DETECT: ${energyPercentage}%`;
                energyLevelText.className = energyPercentage > 75 ? "text-xs font-bold text-yellow-400 mt-1 animate-pulse" : "text-xs text-red-400/80 mt-1";

                // 1. LOGIKA FOKUS (Target Locked)
                if (avgMotion > 10) lastMoveTime = Date.now();
                const timeStable = Date.now() - lastMoveTime;
                const focusProgress = Math.min(100, (timeStable / 7000) * 100);
                
                focusBar.style.width = `${focusProgress}%`;
                if (focusProgress >= 100) {
                    focusStatusText.innerText = "TARGET LOCKED";
                    focusStatusText.className = "text-[10px] text-cyan-300 mt-1 animate-pulse font-bold tracking-widest";
                    drawFocusEnergy();
                } else {
                    focusStatusText.innerText = `STABILIZING... ${Math.floor(focusProgress)}%`;
                    focusStatusText.className = "text-[10px] text-cyan-600 mt-1 tracking-widest";
                }

                // 2. LOGIKA KONDISI GELAP (Entitas Muncul Bergantian)
                if (avgBrightness < 45) { // Ruangan gelap
                    isDarkEnvironment = true;
                    darkAlert.classList.remove('hidden');
                    
                    // Jika belum ada entitas, atau entitas sebelumnya sudah mati (null), buat baru
                    if (!currentEntity) {
                        generateNewEntity();
                    }
                    
                    drawEntity();

                } else { // Terang
                    isDarkEnvironment = false;
                    darkAlert.classList.add('hidden');
                    // Paksa entitas segera menghilang jika tiba-tiba terang
                    if (currentEntity && currentEntity.lifeCycle < currentEntity.maxLife - 50) {
                        currentEntity.lifeCycle = currentEntity.maxLife - 50; 
                    }
                    drawEntity(); // Lanjutkan gambar sisa fade out
                }

            } else {
                energyLevelText.innerText = `SENSOR NONAKTIF`;
                energyLevelText.className = "text-xs text-gray-500 mt-1";
                focusHud.classList.add('hidden');
                darkAlert.classList.add('hidden');
            }

            animationId = requestAnimationFrame(renderFrame);
        }

        toggleFilterBtn.addEventListener('click', () => {
            applyThermalFilter = !applyThermalFilter;
            if(applyThermalFilter) {
                toggleFilterBtn.classList.replace('text-gray-500', 'text-red-500');
                hudOverlay.classList.remove('hidden');
                colorScale.classList.remove('hidden');
                focusHud.classList.remove('hidden');
                lastMoveTime = Date.now();
            } else {
                toggleFilterBtn.classList.replace('text-red-500', 'text-gray-500');
                hudOverlay.classList.add('hidden');
                colorScale.classList.add('hidden');
                focusHud.classList.add('hidden');
                darkAlert.classList.add('hidden');
                currentEntity = null; // Hapus entitas jika sensor dimatikan
            }
        });

        captureBtn.addEventListener('click', () => {
            if (!isCameraOn) return;
            const flash = document.createElement('div');
            flash.className = 'absolute inset-0 bg-white z-50 opacity-80 transition-opacity duration-500';
            video.parentElement.appendChild(flash);
            setTimeout(() => { flash.style.opacity = '0'; }, 50);
            setTimeout(() => { flash.remove(); }, 500);

            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            previewImg.src = dataUrl;
            downloadLink.href = dataUrl;
            downloadLink.download = `META_SCAN_${new Date().getTime()}.jpg`;
            
            setTimeout(() => {
                galleryContainer.classList.remove('hidden');
                galleryContainer.classList.add('flex');
            }, 300);
        });

        initBtn.addEventListener('click', startCamera);
        switchCameraBtn.addEventListener('click', switchCamera);
        closeGalleryBtn.addEventListener('click', () => {
            galleryContainer.classList.add('hidden');
            galleryContainer.classList.remove('flex');
        });

        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(track => track.stop());
            cancelAnimationFrame(animationId);
        });

    </script>
</body>
</html>
